# Full stack: Postgres + pgvector, MinIO (S3), Ollama (LLM), Airflow.
#
# Image versions are pinned for reproducibility.
# Run `make up` to start everything. See Makefile for all targets.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER:-rico}:${POSTGRES_PASSWORD:-rico}@postgres:5432/airflow"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: /opt/airflow
    # Pipeline connection details — service names resolve inside the Docker network.
    POSTGRES_DSN: "postgresql://${POSTGRES_USER:-rico}:${POSTGRES_PASSWORD:-rico}@postgres:5432/${POSTGRES_DB:-rico}"
    MINIO_URL: "http://minio:9000"
    MINIO_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
    MINIO_SECRET: "${MINIO_SECRET_KEY:-minioadmin}"
    MINIO_BUCKET: "${MINIO_BUCKET:-rico-raw}"
    OLLAMA_URL: "http://ollama:11434"
    OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:3b}"
    # Slack webhook — set in your shell or .env, never committed to git.
    SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./tasks:/opt/airflow/tasks
    - airflow-logs:/opt/airflow/logs

services:

  postgres:
    # PostgreSQL 16 LTS + pgvector 0.8 (HNSW + halfvec available).
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rico}
      POSTGRES_USER: ${POSTGRES_USER:-rico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rico}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Migrations run alphabetically on first init (empty data dir).
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rico} -d ${POSTGRES_DB:-rico}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    # Pinned RELEASE: MinIO ships breaking server/CLI changes on :latest.
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-rico-raw} &&
      echo 'minio bucket ready'
      "
    restart: "no"

  ollama:
    # Pinned API surface (/api/tags, /api/generate) — the notebook contract.
    image: ollama/ollama:0.5.4
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama --version >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:0.5.4
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: >
      /bin/sh -c "ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} && echo 'ollama model ready'"
    restart: "no"

  # ── Airflow ──────────────────────────────────────────────────────────────────

  airflow-init:
    <<: *airflow-common
    command: >-
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&
        echo 'airflow init complete'
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
  ollama-data:
  airflow-logs:
